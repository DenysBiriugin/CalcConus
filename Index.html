<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Конус калькулятор</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f2f2f7;
    padding: 20px;
}
.card {
    background: white;
    border-radius: 12px;
    padding: 20px;
    max-width: 400px;
    margin: auto;
}
input {
    width: 100%;
    padding: 12px;
    font-size: 18px;
    margin-top: 10px;
}
button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    font-size: 18px;
    background: #007aff;
    color: white;
    border: none;
    border-radius: 10px;
}
.result {
    margin-top: 20px;
    font-size: 18px;
}
</style>
</head>

<body>
<div class="card">
<h2>Конус калькулятор</h2>

<label>Глибина h</label>
<input id="h" type="number" step="any">

<label>Кут α (градуси)</label>
<input id="a" type="number" step="any">

<button onclick="calc()">Розрахувати</button>

<div class="result">
<p>Радіус: <span id="r">–</span></p>
<p>Діаметр: <span id="d">–</span></p>
</div>
</div>

<script>
function calc() {
    let h = parseFloat(document.getElementById("h").value);
    let a = parseFloat(document.getElementById("a").value);

    if (isNaN(h) || isNaN(a)) return;

    let r = h * Math.tan((a / 2) * Math.PI / 180);
    let d = r * 2;

    document.getElementById("r").innerText = r.toFixed(2);
    document.getElementById("d").innerText = d.toFixed(2);
}
</script>
</body>
</html>
